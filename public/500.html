<!DOCTYPE html>
<html lang="en-ZA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Something went wrong — GovCompass</title>
    <meta name="description" content="An unexpected error occurred." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#355E3B" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        color: #1a1a1a;
        font-family: "Source Serif 4", Georgia, serif;
        -webkit-font-smoothing: antialiased;
      }
      .container {
        max-width: 480px;
        padding: 2rem 1rem;
        text-align: center;
      }
      h1 {
        font-family: Inter, system-ui, sans-serif;
        font-size: 3.75rem;
        font-weight: 700;
        color: #355e3b;
        margin: 0 0 1rem;
      }
      p {
        font-size: 1.25rem;
        color: #6b6b6b;
        margin: 0 0 2rem;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: center;
      }
      @media (min-width: 640px) {
        .actions { flex-direction: row; justify-content: center; }
      }
      a {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        font-family: Inter, system-ui, sans-serif;
        font-weight: 600;
        font-size: 1rem;
        border-radius: 0.25rem;
        text-decoration: none;
        transition: background-color 0.15s;
      }
      .btn-primary {
        background: #355e3b;
        color: #fff;
      }
      .btn-primary:hover { background: #264a2c; }
      .btn-outline {
        border: 1px solid #355e3b;
        color: #355e3b;
        background: transparent;
      }
      .btn-outline:hover { background: #e6efe8; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>500</h1>
      <p>Something went wrong on our end. Please try again in a moment.</p>
      <div class="actions">
        <a href="/" class="btn-primary">Go home</a>
        <a href="/big-picture" class="btn-outline">Browse the series</a>
      </div>
    </div>
  </body>
</html>
