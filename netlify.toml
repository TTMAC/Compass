[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Production (main branch)
[context.production.environment]
  SITE_URL = "https://govcompass.co.za"

# Staging (staging branch)
[context.staging.environment]
  SITE_URL = "https://staging--govcompass.netlify.app"
  PUBLIC_GA4_ID = ""

# Development (develop branch)
[context.develop.environment]
  SITE_URL = "https://develop--govcompass.netlify.app"
  PUBLIC_GA4_ID = ""

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://identity.netlify.com https://*.netlify.com; frame-src 'self'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com https://www.googletagmanager.com https://*.clerk.accounts.dev https://clerk.govcompass.co.za https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://img.clerk.com; connect-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://analytics.google.com https://*.google-analytics.com https://identity.netlify.com https://*.clerk.accounts.dev https://clerk.govcompass.co.za https://clerk-telemetry.com; frame-src https://challenges.cloudflare.com https://*.clerk.accounts.dev https://clerk.govcompass.co.za; worker-src 'self' blob:; manifest-src 'self'"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[redirects]]
  from = "/series"
  to = "/pillars/government-structure"
  status = 301

# No catch-all `/* -> /404` (or `/500`) redirect. With the @astrojs/netlify
# SSR adapter, a catch-all redirect outranks the on-demand function and
# swallows every SSR route (auth pages, gated /reform-* pages) into the static
# 404 — confirmed on a real branch deploy. Netlify already serves dist/404.html
# for unmatched static routes, and the SSR function renders 404.astro for
# unmatched on-demand routes, so no fallback rule is needed.
